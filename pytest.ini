[pytest]
# Los archivos de test usan nombres descriptivos (no el patrón test_*.py),
# por eso ampliamos el descubrimiento a todos los .py del proyecto.
# Las funciones de test sí siguen la convención test_*.
python_files = *.py
python_classes = Test*
python_functions = test_*

# Carpetas que no contienen tests.
norecursedirs = .git .github allure-results allure-report allure-history __pycache__ .venv venv examples

# Genera resultados de Allure por defecto y muestra resumen de fallos/skips.
addopts = --alluredir=allure-results -ra

markers =
    front: tests del sitio público (preprod.amv.travel)
    bo: tests del BackOffice (preprod.bo.amv.travel)
    webadmin: tests del panel WebAdmin (/administration/)
    smoke: subconjunto rápido de humo

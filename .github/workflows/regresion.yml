name: AMV Travel Preprod Suite

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Qué correr. Default: solo webadmin/. Ej: bo/crear_op.py | -m bo | bo/ web/ webadmin/'
        required: false
        default: 'webadmin/crear_tag.py'

# ==============================================================================
# PERMISOS: autoriza el push del reporte a GitHub Pages
# ==============================================================================
permissions:
  contents: write

jobs:
  test-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar Tests
        env:
          AMV_USER: ${{ secrets.AMV_USER }}
          AMV_PASS: ${{ secrets.AMV_PASS }}
          AMV_AGENCIA_USER: ${{ secrets.AMV_AGENCIA_USER }}
          BO_PASS: ${{ secrets.BO_PASS }}
          BO_USER: ${{ secrets.BO_USER }}
          # En 'Run workflow' se toma el input; en push (sin input) corre solo crear_tag.
          TARGET: ${{ github.event.inputs.target || 'webadmin/crear_tag.py' }}
        # Sin comillas en $TARGET para permitir expresiones de marker (ej: -m smoke).
        # '|| true' evita que un test fallido corte la generación del reporte.
        run: pytest $TARGET || true

      - name: Subir resultados de Allure (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

      - name: Generar carpeta con Fecha y Hora
        run: echo "REPORT_DATE=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_ENV

      - name: Generar Reporte Allure
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_histories: 1

      - name: Desplegar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
